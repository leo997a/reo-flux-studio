<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>اصنع صورتك</title><style>
:root{--bg:#0b0f17;--card:#121826;--muted:#8b98b8;--txt:#f4f7ff;--acc:#4f8cff;--acc2:#6aa4ff;--ok:#19c37d}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Tahoma;background:radial-gradient(circle at top,#16203a 0,#0b0f17 45%);color:var(--txt)}
.wrap{min-height:100dvh;display:grid;place-items:center;padding:18px}.card{width:min(100%,560px);background:rgba(18,24,38,.92);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
h1{margin:0 0 8px;font-size:32px}p{margin:0 0 16px;color:var(--muted);line-height:1.7}.row{display:grid;gap:10px}
.file{display:flex;align-items:center;justify-content:center;height:54px;border:1px dashed rgba(255,255,255,.18);border-radius:16px;background:#0f1523;cursor:pointer;color:#dfe7ff}
.file input{display:none}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{height:50px;border:0;border-radius:16px;font-weight:700;cursor:pointer}
.primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}.ghost{background:#1a2234;color:#fff}.btn:disabled{opacity:.6;cursor:not-allowed}
.status{min-height:24px;margin:12px 0 0;color:#dbe6ff;font-size:14px}.spin{display:inline-block;width:16px;height:16px;border:2px solid #ffffff40;border-top-color:#fff;border-radius:50%;animation:r 1s linear infinite;vertical-align:-3px;margin-left:6px}@keyframes r{to{transform:rotate(360deg)}}
.out{display:none;margin-top:16px}.img{width:100%;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:#0f1523}.tag{display:inline-block;margin-top:10px;background:#113523;color:#9ff0c9;padding:8px 12px;border-radius:999px;font-size:13px}
@media(max-width:520px){h1{font-size:26px}.btns{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><div class="card"><h1>اصنع صورتك</h1><p>ارفع صورة واحدة واضحة لوجهك، ثم اضغط إنشاء. النتيجة ستظهر هنا مباشرة.</p><div class="row"><label class="file">اختر صورة<input id="image" type="file" accept="image/*"></label><div class="btns"><button id="go" class="btn primary">إنشاء الصورة</button><a id="dl" class="btn ghost" style="display:grid;place-items:center;text-decoration:none;pointer-events:none;opacity:.5">تحميل الصورة</a></div></div><div id="status" class="status"></div><div id="out" class="out"><img id="result" class="img"><div class="tag">تم إنشاء الصورة بنجاح ✅</div></div></div></div><script>
const $=id=>document.getElementById(id),img=$("image"),go=$("go"),dl=$("dl"),st=$("status"),out=$("out"),res=$("result");
img.onchange=()=>{document.querySelector(".file").childNodes[0].textContent=img.files[0]?img.files[0].name:"اختر صورة";};
go.onclick=async()=>{if(!img.files[0]){st.textContent="اختر صورة أولًا";return;}
go.disabled=true;st.innerHTML='<span class="spin"></span> جارٍ إنشاء الصورة... قد يستغرق الأمر 10 إلى 30 ثانية';out.style.display="none";dl.style.pointerEvents="none";dl.style.opacity=".5";
const fd=new FormData();fd.append("image",img.files[0]);
try{const r=await fetch("/generate",{method:"POST",body:fd}),d=await r.json();if(!d.ok||!d.image)throw new Error(d.error||"فشل التوليد");
res.src=d.image;dl.href=d.image;dl.download="reo-image.png";dl.style.pointerEvents="auto";dl.style.opacity="1";st.textContent="جاهزة ✅";out.style.display="block";
}catch(e){st.textContent="حدث خطأ: "+e.message}finally{go.disabled=false}};
</script></body></html>
