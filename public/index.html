<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اصنع صورتك</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 40px auto; padding: 20px; }
    .box { border: 1px solid #ddd; border-radius: 16px; padding: 20px; }
    button { padding: 12px 18px; cursor: pointer; }
    img { max-width: 100%; margin-top: 20px; border-radius: 14px; }
    #status { margin-top: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>اصنع صورتك</h1>
    <p>ارفع صورة واحدة واضحة لوجهك، ثم اضغط إنشاء.</p>
    <input id="image" type="file" accept="image/*" />
    <button id="generateBtn">إنشاء الصورة</button>
    <p id="status"></p>
    <img id="result" style="display:none;" />
  </div>

  <script>
    const btn = document.getElementById("generateBtn");
    const input = document.getElementById("image");
    const status = document.getElementById("status");
    const result = document.getElementById("result");

    btn.onclick = async () => {
      const file = input.files[0];
      if (!file) {
        status.textContent = "اختر صورة أولًا";
        return;
      }

      const form = new FormData();
      form.append("image", file);

      status.textContent = "جارٍ إنشاء الصورة...";

      const res = await fetch("/generate", {
        method: "POST",
        body: form,
      });

      const data = await res.json();

      if (!data.ok) {
        status.textContent = data.error || "فشل التوليد";
        return;
      }

      result.src = data.image;
      result.style.display = "block";
      status.textContent = "تم إنشاء الصورة بنجاح";
    };
  </script>
</body>
</html>
